name: Deploy Blume to GitHub Pages

on:
  push:
    branches: ["main"] # デフォルトブランチ名に合わせて調整してください（main または master など）

  # 手動実行も可能にする場合
  workflow_dispatch:

# GitHub Pagesへのデプロイに必要な権限を設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行時の競合を防ぐ設定（古いビルドを自動キャンセル）
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Blumeの推奨環境（Node 22.12以降）に合わせます

      - name: Install dependencies
        run: npm ci # pnpmやyarn、bunをお使いの場合は適宜変更してください

      - name: Build docs
        run: npx blume build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist # Blumeのデフォルト出力先

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5